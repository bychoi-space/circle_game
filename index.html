<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>노원수학문화관 원 그리기 게임</title>
  <meta name="description" content="노원수학문화관에서 즐기는 완벽한 원 그리기 테스트! 모바일에 최적화된 원 그리기 정확도 테스트 게임입니다.">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  
  <!-- Font Preloading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header Controls -->
    <header class="app-header">
      <div class="logo-area">
        <img src="logo.svg" alt="노원수학문화관 로고" class="app-logo">
        <h1>노원수학문화관 원 그리기 게임</h1>
      </div>
      <div class="header-controls">
        <button id="sound-toggle" class="control-btn" aria-label="음향 토글">
          <svg class="icon sound-on-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
          <svg class="icon sound-off-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
          </svg>
      </div>
    </header>

    <!-- Left Sidebar Area (PC) -->
    <div class="left-sidebar">
      <!-- Score Dashboard -->
      <section class="dashboard">
        <div class="stat-card">
          <span class="stat-label">BEST SCORE</span>
          <span id="best-score" class="stat-value">0.0%</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">LAST SCORE</span>
          <span id="last-score" class="stat-value">0.0%</span>
        </div>
      </section>

      <!-- Bottom Actions / Controls -->
      <footer class="app-footer">
        <div class="guide-toggle-area">
          <span class="guide-label">가이드 원 표시</span>
          <label class="switch">
            <input type="checkbox" id="guide-circle-toggle" checked>
            <span class="slider round"></span>
          </label>
        </div>
        <button id="reset-canvas-btn" class="action-btn outline">초기화</button>
      </footer>
    </div>

    <!-- Game Viewport -->
    <main class="game-viewport">
      <div class="canvas-container" id="canvas-container">
        <canvas id="game-canvas"></canvas>
        <div id="center-point" class="center-point">
          <div class="pulse"></div>
        </div>
        <div id="realtime-score" class="realtime-score hidden">0.0%</div>
        <div id="draw-guide-text" class="draw-guide-text">
          빨간색 점을 중심으로 원을 그리세요.<br>
          정밀도, 일정함, 일치도로 점수가 매겨집니다.
        </div>
      </div>
    </main>

    <!-- Score History Section -->
    <section class="history-section">
      <div class="history-header">
        <h3>최근 기록 (최대 10회)</h3>
      </div>
      <div class="history-list-wrapper">
        <ul id="history-list" class="history-list">
          <li class="empty-history">아직 시도한 기록이 없습니다.</li>
        </ul>
      </div>
    </section>

    <!-- Result Modal (Glassmorphism Overlay) -->
    <div id="result-overlay" class="overlay hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h2>측정 결과</h2>
        </div>
        <div class="result-score-container">
          <div class="score-radial">
            <svg class="progress-ring" viewBox="0 0 120 120">
              <circle class="progress-ring-bg" cx="60" cy="60" r="52" stroke-width="8" fill="transparent"/>
              <circle id="progress-ring-bar" class="progress-ring-bar" cx="60" cy="60" r="52" stroke-width="8" fill="transparent"/>
            </svg>
            <div class="score-text-wrapper">
              <span id="result-score" class="result-score-val">0.0%</span>
              <span id="result-grade" class="result-grade-val">A</span>
            </div>
          </div>
        </div>
        
        <div class="result-details">
          <div class="detail-item">
            <span class="detail-label">중심 정밀도</span>
            <span id="detail-center-acc" class="detail-value">0.0%</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">일정함 (반지름 편차)</span>
            <span id="detail-radius-dev" class="detail-value">0.0%</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">닫힘성 (일치도)</span>
            <span id="detail-close-acc" class="detail-value">0.0%</span>
          </div>
        </div>

        <p id="result-comment" class="result-comment">훌륭한 실력이군요! 완벽에 한 걸음 더 다가섰습니다.</p>
        
        <div class="modal-actions">
          <button id="close-result-btn" class="action-btn primary">다시 그리기</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
